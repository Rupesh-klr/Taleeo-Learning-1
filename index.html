<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TALeeO LMS — Learning Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  
  <link rel="stylesheet" href="css/global.css">
  
  <script src="js/routes.js"></script>
  <script src="js/modules/auth.js"></script>
  <script src="js/modules/curriculum.js"></script>
  </head>
<body>

  <div class="bg-orbs">
    <div class="bg-orb bo1"></div>
    <div class="bg-orb bo2"></div>
    <div class="bg-orb bo3"></div>
  </div>
  <div class="toast" id="toast"><span class="toast-icon">✅</span><span id="toast-msg"></span></div>

  <div id="app-shell" style="display:none;">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sb-logo-text">TALeeO LMS</div>
        <div class="sb-logo-sub" id="sb-role-badge">Loading...</div>
      </div>
      
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      
      <div class="sidebar-footer">
        <div class="sb-user">
          <div class="sb-avatar" id="sb-avatar">U</div>
          <div>
            <div class="sb-name" id="sb-name">User</div>
            <div class="sb-role" id="sb-role">Role</div>
          </div>
          <button class="sb-logout" onclick="auth.doLogout()" title="Logout">⏻</button>
        </div>
      </div>
    </div>

    <div class="main-content" id="main-content">
      </div>
  </div>
  <script src="js/routes.js"></script>
<script src="js/modules/auth.js"></script>
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/curriculum.js"></script>
<script src="js/modules/batches.js"></script>
<script src="js/modules/recordings.js"></script>
<script src="js/modules/attendance.js"></script>

<!-- <script src="js/app.js"></script> -->

  <script src="js/app.js"></script>
</body>
</html>
