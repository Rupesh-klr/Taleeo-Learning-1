<div class="module-container anim-in">
    <div class="login-card">
        <div id="step-login">
            <div class="login-title">Welcome back 👋</div>
            <div class="login-sub">Sign in to continue learning.</div>
            <div id="login-msg" class="login-msg"></div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" id="login-pass" placeholder="Enter password">
            </div>
            <button class="btn btn-v btn-full" onclick="auth.doLogin()">Sign In →</button>
        </div>
    </div>
</div>
